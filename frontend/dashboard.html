<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      text-align: center;
    }

    .navbar {
      background-color: #111;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h2 {
      margin: 0;
      padding-left: 15px;
    }

    .logout-btn {
      margin-right: 15px;
      padding: 6px 12px;
      background: #ff4d4d;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .container {
      padding: 40px 20px;
    }

    .cards {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 220px;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .card button {
      margin-top: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="navbar">
  <h2>Code Refactor Dashboard</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">
  <h2>Welcome <span id="user"></span> 👋</h2>

  <div class="cards">
    <div class="card">
      <h3>Repositories</h3>
      <p>View and manage your GitHub repositories.</p>
      <button onclick="goRepos()">Open</button>
    </div>

    <div class="card">
      <h3>AI Analysis</h3>
      <p>Analyze your code using AI agents.</p>
      <button onclick="goRepos()">Analyze</button>
    </div>

    <div class="card">
      <h3>⚙ Profile</h3>
      <p>Manage your account settings.</p>
      <button disabled>Coming Soon</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>

<script>
  const params = new URLSearchParams(window.location.search);

  if (params.get("token")) {
    localStorage.setItem("jwt_token", params.get("token"));
    localStorage.setItem("github_user", params.get("user"));
    history.replaceState({}, "", "dashboard.html");
  }

  const token = localStorage.getItem("jwt_token");
  const user = localStorage.getItem("github_user");

  if (!token || !user) {
    window.location.href = "index.html";
  }

  document.getElementById("user").innerText = user;

  function goRepos() {
    window.location.href = "repo.html";
  }

  function logout() {
    localStorage.removeItem("jwt_token");
    localStorage.removeItem("github_user");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
