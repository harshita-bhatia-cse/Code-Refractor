<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container page-shell">
  <h2>Welcome <span id="user"></span></h2>
  <div id="buildTag" class="muted-text">build: 20260301b</div>

  <div class="action-row">
    <button id="reposBtn" class="action-btn" onclick="goRepos()" disabled>View Repositories</button>
  </div>
</div>

<script>
  const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
  const params = new URLSearchParams(hash);

  if (params.get("token")) {
    const token = params.get("token");
    const user = params.get("user");
    sessionStorage.setItem("jwt_token", token);
    sessionStorage.setItem("github_user", user || "");
    history.replaceState({}, "", "dashboard.html");
  }

  const activeToken = sessionStorage.getItem("jwt_token");
  const activeUser = sessionStorage.getItem("github_user");

  if (!activeToken || !activeUser) {
    window.location.href = "index.html";
  } else {
    sessionStorage.setItem("jwt_token", activeToken);
    sessionStorage.setItem("github_user", activeUser);
    document.getElementById("user").innerText = activeUser;
    document.getElementById("reposBtn").disabled = false;
  }

  function goRepos() {
    const token = sessionStorage.getItem("jwt_token");
    if (!token) {
      window.location.href = "index.html";
      return;
    }
    window.location.href = "repo.html";
  }
</script>




</body>
</html>
