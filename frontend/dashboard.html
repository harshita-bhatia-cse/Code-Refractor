<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<h2>Welcome <span id="user"></span></h2>
<div id="buildTag" style="font-size:12px;color:#666;">build: 20260301b</div>

<button id="reposBtn" onclick="goRepos()" disabled>View Repositories</button>

<script>
  const params = new URLSearchParams(window.location.search);

  if (params.get("token")) {
    const token = params.get("token");
    const user = params.get("user");
    sessionStorage.setItem("jwt_token", token);
    sessionStorage.setItem("github_user", user || "");
    localStorage.setItem("jwt_token", token);
    localStorage.setItem("github_user", user || "");
    history.replaceState({}, "", "dashboard.html");
  }

  const activeToken = localStorage.getItem("jwt_token") || sessionStorage.getItem("jwt_token");
  const activeUser = localStorage.getItem("github_user") || sessionStorage.getItem("github_user");

  if (!activeToken || !activeUser) {
    window.location.href = "index.html";
  } else {
    sessionStorage.setItem("jwt_token", activeToken);
    sessionStorage.setItem("github_user", activeUser);
    localStorage.setItem("jwt_token", activeToken);
    localStorage.setItem("github_user", activeUser);
    document.getElementById("user").innerText = activeUser;
    document.getElementById("reposBtn").disabled = false;
  }

  function goRepos() {
    const token = localStorage.getItem("jwt_token") || sessionStorage.getItem("jwt_token");
    if (!token) {
      window.location.href = "index.html";
      return;
    }
    window.location.href = "repo.html";
  }
</script>




</body>
</html>
