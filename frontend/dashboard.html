<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="container page-shell">
    <h2 class="welcome-text">Welcome <span id="user"></span></h2>
    <div id="buildTag" class="muted-text">build: 20260301b</div>

    <div class="action-row">
      <button id="reposBtn" class="action-btn" onclick="goRepos()" disabled>
        <span class="btn-text">View Repositories</span>
        <span class="btn-loader"></span>
      </button>
    </div>

    <div class="action-row">
      <button id="logoutBtn" onclick="logout()" class="action-btn logout-btn">
        <span class="btn-text">Logout</span>
        <span class="btn-loader"></span>
      </button>
    </div>

  <script>
    const hash = window.location.hash.startsWith("#")
      ? window.location.hash.slice(1)
      : "";

    const params = new URLSearchParams(hash);

    if (params.get("token")) {
      const token = params.get("token");
      const user = params.get("user");

      sessionStorage.setItem("jwt_token", token);
      sessionStorage.setItem("github_user", user || "");

      history.replaceState({}, "", "dashboard.html");
    }

    const activeToken = sessionStorage.getItem("jwt_token");
    const activeUser = sessionStorage.getItem("github_user");

    if (!activeToken || !activeUser) {
      const currentPage = window.location.pathname.split("/").pop();
      if (currentPage !== "index.html") {
        window.location.href = "index.html";
      }
    } else {
      document.getElementById("user").innerText = activeUser;
      document.getElementById("reposBtn").disabled = false;
    }

    function goRepos() {
      const token = sessionStorage.getItem("jwt_token");
      const reposBtn = document.getElementById("reposBtn");

      if (!token) {
        window.location.href = "index.html";
        return;
      }

      reposBtn.disabled = true;
      reposBtn.classList.add("loading");
      window.location.href = "repo.html";
    }

    function logout() {
      const token = sessionStorage.getItem("jwt_token");
      const logoutBtn = document.getElementById("logoutBtn");

      logoutBtn.disabled = true;
      logoutBtn.classList.add("loading");

      fetch("http://127.0.0.1:8000/logout", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token
        }
      })
      .then(res => res.json())
      .then(data => {
        sessionStorage.removeItem("jwt_token");
        sessionStorage.removeItem("github_user");
        window.location.href = "index.html";
      })
      .catch(err => {
        console.error(err);
        logoutBtn.disabled = false;
        logoutBtn.classList.remove("loading");
        alert("Logout failed. Please try again.");
      });
    }
  </script>

</body>
</html>
