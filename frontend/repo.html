<!DOCTYPE html>
<html>
<head>
    <title>My Repositories · AI Refactor</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="container">
        <button onclick="window.location.href='dashboard.html'" class="btn" style="margin-bottom: 15px;">← Dashboard</button>
        
        <div class="box">
            <div class="box-header">Your GitHub Repositories</div>
            <ul id="repoList"><li>Loading repositories...</li></ul>
        </div>

        <div class="box">
            <div class="box-header">✨ AI Repository Analysis</div>
            <div id="llm-box" class="box-body">Select a repository to analyze.</div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script type="module" src="js/repo.js"></script>
</body>
</html>
